      <section id="join" class="page">
        <h2>🌍 How to Join Wilden</h2>
        <div class="grid">
          <div class="card"><h3>Server IP</h3><p><code>play.wilden.fun</code></p></div>
          <div class="card"><h3>Bedrock Port</h3><p><code>19132</code></p></div>
          <div class="card"><h3>Discord</h3><p><a href="https://discord.gg/wilden">https://discord.gg/wilden</a></p></div>

        <h3>📱 Bedrock Edition</h3>
        <ol><li>Open Minecraft Bedrock Edition.</li><li>Go to <strong>Play → Servers</strong>.</li><li>Select <strong>Add Server</strong>.</li><li>Use address <code>play.wilden.fun</code> and port <code>19132</code>.</li><li>Save and join.</li></ol>
        <h3>💻 Java Edition</h3>
        <ol><li>Open Minecraft Java Edition.</li><li>Go to <strong>Multiplayer</strong>.</li><li>Click <strong>Add Server</strong>.</li><li>Use server address <code>play.wilden.fun</code>.</li><li>Join the server.</li></ol>

      <section id="claims" class="page">
        <h2>🏡 Land Claims</h2>
        <p>Land Claims allow players to protect builds, items, and progress. Everything inside a claim is protected and only accessible to players you trust.</p>
        <h3>🚀 Getting Started</h3>
        <ul><li>Hold a golden shovel.</li><li>Right-click a block to set the first corner.</li><li>Right-click another block to set the second corner.</li><li>Your land is now protected.</li></ul>
        <h3>📦 Claim Blocks</h3>
        <ul><li>Earn 125 claim blocks per hour of playtime.</li><li>Earn 125 claim blocks per vote.</li><li>Buy blocks with <code>/buyclaimblocks</code> at $25 per block.</li><li>Claim blocks are fully refunded when resizing or deleting a claim.</li></ul>
        <h3>⚙️ Useful Commands</h3>
        <table>
          <tr><th>Command</th><th>Use</th></tr>
          <tr><td><code>/claimsguide</code></td><td>View claim help.</td></tr>
          <tr><td><code>/buyclaimblocks</code></td><td>Buy more claim blocks.</td></tr>
          <tr><td><code>/abandonclaim</code></td><td>Delete the claim you are standing in.</td></tr>
          <tr><td><code>/trust [player]</code></td><td>Allow building access.</td></tr>
          <tr><td><code>/untrust [player]</code></td><td>Remove access.</td></tr>
          <tr><td><code>/accesstrust [player]</code></td><td>Allow buttons and doors only.</td></tr>
          <tr><td><code>/containertrust [player]</code></td><td>Allow chest/container access only.</td></tr>
          <tr><td><code>/trustlist</code></td><td>View trusted players.</td></tr>
          <tr><td><code>/banfromclaim [player]</code></td><td>Block a player from entering your claim.</td></tr>
          <tr><td><code>/unbanfromclaim [player]</code></td><td>Allow a banned player to enter again.</td></tr>
        </table>
        <div class="notice success">Server owners Length and Surge use this system to help keep gameplay fair and protected.</div>
        <div class="footer-nav"><a href="#home">Main Page</a> • <a href="#commands">Commands</a> • <a href="#rules">Rules</a></div>
      </section>

      <section id="branches" class="page">
        <h2>🌿 Branches</h2>
        <p>Branches is Wilden's custom progression system. When first joining, players choose a branch with unique passive perks and unlockable upgrades.</p>
        <div class="grid">
          <div class="card"><h3>🌊 Tides</h3><p>Built for water players.</p><ul><li>20% faster swim speed</li><li>Water breathing</li><li>Underwater visibility</li><li>Bonus fishing luck</li></ul></div>
          <div class="card"><h3>🌿 Roots</h3><p>Built for nature biomes.</p><ul><li>15% faster crop growth</li><li>Natural biome ore chances</li></ul></div>
          <div class="card"><h3>🔥 Ember</h3><p>Built for combat players.</p><ul><li>Fire aura</li><li>50% fire damage reduction</li><li>30% Fire Aspect chance</li></ul></div>
          <div class="card"><h3>🌾 Verdant</h3><p>Built for farmers and miners.</p><ul><li>10% faster crop growth</li><li>Extra crop drops</li><li>Extra ore drop chance</li></ul></div>
        </div>
        <h3>🔄 Switching Branches</h3>
        <p>Use <code>/branches switch</code>. The first switch is free. The second costs $100,000, and the cost doubles with each switch. All upgrades are permanently lost and non-refundable when switching.</p>
        <div class="footer-nav"><a href="#home">Main Page</a> • <a href="#auraskills">AuraSkills</a> • <a href="#commands">Commands</a></div>
      </section>

      <section id="pyrofishing" class="page">
        <h2>🎣 PyroFishing</h2>
        <p>PyroFishing transforms vanilla fishing into a full progression system with custom fish, skills, augments, deliveries, and totems.</p>
        <div class="grid">
          <div class="card"><h3>📊 Fish Menu</h3><p>Use <code>/fish menu</code> to open your main fishing hub.</p></div>
          <div class="card"><h3>🫧 Entropy</h3><p>Earn entropy by gutting fish. Use it for augments, totems, and skill refunds.</p></div>
          <div class="card"><h3>🐟 Fish Shop</h3><p>Use <code>/fish shop</code> to sell custom fish.</p></div>
          <div class="card"><h3>📦 Deliveries</h3><p>Use <code>/fish deliveries</code> to complete fishing tasks for rewards.</p></div>
          <div class="card"><h3>📖 Fish Codex</h3><p>Use <code>/fish codex</code> to view custom fish and progress.</p></div>
          <div class="card"><h3>🧪 Gutting</h3><p>Use <code>/fish gut</code> to turn fish into entropy.</p></div>
          <div class="card"><h3>⚖️ Fish Scales</h3><p>Use <code>/fish scales</code> to affect sell values.</p></div>
          <div class="card"><h3>🎒 Fish Bag</h3><p>Use <code>/fish bag</code> for custom fish storage.</p></div>
          <div class="card"><h3>✨ Augments</h3><p>Use <code>/fish augments</code> to view recipes and <code>/fish augment</code> to apply them.</p></div>
          <div class="card"><h3>🏛️ Fishing Totem</h3><p>Build and activate the totem to unlock powerful fishing upgrades.</p></div>
        </div>
        <div class="footer-nav"><a href="#home">Main Page</a> • <a href="#branches">Branches</a> • <a href="#commands">Commands</a></div>
      </section>

      <section id="auraskills" class="page">
        <h2>📈 AuraSkills</h2>
        <p>AuraSkills rewards players for playing naturally. Actions like mining, farming, and combat give XP, level up skills, and unlock rewards.</p>
        <h3>🧠 Skills & XP</h3>
        <ul><li>Mining XP from mining.</li><li>Farming XP from farming.</li><li>Combat XP from fighting.</li></ul>
        <h3>📊 Viewing Skills</h3>
        <p>Use <code>/skills</code> to open the main skill menu. Skill-specific commands like <code>/mining</code>, <code>/farming</code>, and <code>/combat</code> can show individual skill details.</p>
        <h3>🎁 Rewards</h3>
        <p>Rewards can include stat increases, commands, items, money, health, mana, wisdom, strength, and other bonuses.</p>
        <h3>⚙️ Commands Summary</h3>
        <ul><li><code>/skills</code> — Open main skill menu.</li><li><code>/mining</code>, <code>/farming</code>, <code>/combat</code> — View specific skills.</li><li><code>/stats</code> — View stats if enabled.</li><li><code>/skillpoints</code> — Manage stat points if enabled.</li></ul>
        <div class="footer-nav"><a href="#home">Main Page</a> • <a href="#commands">Commands</a> • <a href="#branches">Branches</a></div>
      </section>

      <section id="events" class="page">
        <h2>👑 Custom Events System</h2>
        <p>Wilden features a unique 48-hour event cycle where the community works together to influence what happens on the server.</p>
        <div class="grid">
          <div class="card"><h3>🟢 Good Events</h3><p>75% chance. The community contributes gems to extend the duration.</p></div>
          <div class="card"><h3>🔴 Bad Events</h3><p>25% chance. The community contributes gems to stop the event early.</p></div>
          <div class="card"><h3>🧙 Wizard NPC</h3><p>Visit the Wizard at spawn to view timers, contribute gems, view leaderboards, and speed up countdowns.</p></div>
        </div>
        <h3>✨ Good Events</h3>
        <ul><li>Golden Hour — Ore drops doubled.</li><li>Bountiful Harvest — Mob drops doubled.</li><li>Fertile Rain — Crops grow 50% faster.</li><li>Wildlife Invasion — Passive animals spawn in the wild.</li><li>Lucky Seed — Next crop harvested gives a rare item.</li></ul>
        <h3>⚠️ Bad Events</h3>
        <ul><li>Frostbite — Cold biome damage.</li><li>Hunger Curse — Hunger drains faster.</li><li>Toxic Rain — Players outside take damage.</li></ul>
        <h3>⚡ Speed-Up Costs</h3>
        <p>1st use: 100 gems • 2nd: 200 gems • 3rd: 400 gems • 4th: 800 gems • Max: 8x speed-up. Speed-ups are not refunded.</p>

      <section id="rules" class="page">
        <h2>⚖️ Wilden Server Rules</h2>
        <h3>🎮 In-Game Rules</h3>
        <ul><li>Play fairly. Cheats, hacked clients, and unfair mods are not allowed.</li><li>Do not abuse bugs, glitches, or unintended mechanics.</li><li>Punishment evasion and alternate accounts are prohibited.</li><li>Follow staff instructions.</li><li>Treat players with respect.</li><li>Keep chat appropriate and family-friendly.</li><li>No X-ray, macros, autoclickers, bots, scripts, or automation.</li><li>No auto-fishing or unfair AFK farming methods.</li><li>No duplication glitches or exploit abuse.</li><li>No spamming or advertising.</li><li>Do not create lag machines or crash attempts.</li><li>Do not interfere with protected areas.</li><li>Skins and usernames must be appropriate.</li></ul>
        <h3>💬 Discord Rules</h3>
        <ul><li>Follow Discord Terms of Service.</li><li>Do not ping staff unless necessary.</li><li>Be respectful.</li><li>No racism, discrimination, hate speech, or harassment.</li><li>Avoid NSFW, self-harm, drugs, or controversial topics.</li><li>No spamming, flooding, advertising, scamming, phishing, or trolling.</li><li>Keep usernames, avatars, and statuses appropriate.</li><li>Do not share personal information.</li><li>No threats of DDoS, doxxing, or raids.</li><li>Do not use alt accounts to avoid punishments.</li></ul>
        <div class="notice danger">Rules are subject to change with or without notice.</div>
